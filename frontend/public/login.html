<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — SEAIT Enrollment</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html">← Home</a>
      <strong>Portal login</strong>
      <span></span>
    </header>
    <main style="max-width: 420px; margin: 3rem auto; padding: 1rem">
      <div class="card">
        <h2 style="margin-top: 0">Welcome back</h2>
        <p style="color: var(--muted); font-size: 0.95rem">Use your institutional email and password.</p>
        <div id="err" class="alert alert-error hidden"></div>
        <form id="f">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="username" />

          <label for="pw" style="margin-top: 1rem">Password</label>
          <input type="password" id="pw" name="password" required autocomplete="current-password" />

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.25rem">
            Sign in
          </button>
        </form>
        <p style="margin-top: 1.25rem; font-size: 0.85rem; color: var(--muted)">
          Demo: <code>admin@seait.edu.ph</code> / <code>Admin@2026!</code> — run <code>python seed.py</code> first.
        </p>
      </div>
    </main>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
      document.getElementById('f').addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('err');
        err.classList.add('hidden');
        try {
          const data = await api.post('/api/auth/login', {
            email: document.getElementById('email').value,
            password: document.getElementById('pw').value,
          });
          localStorage.setItem('access_token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } catch (x) {
          err.textContent = x.message || 'Login failed';
          err.classList.remove('hidden');
        }
      });
    </script>
  </body>
</html>
