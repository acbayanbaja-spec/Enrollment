# Render Blueprint — builds from repo root (uses ./requirements.txt → backend/requirements.txt).
# Start runs uvicorn from backend/ so `app.main` imports correctly.
# Create PostgreSQL first; set DATABASE_URL to Internal URL on the Web Service.

services:
  - type: web
    name: seait-enrollment-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Use start.sh so cwd is backend/ (fixes ModuleNotFoundError: No module named 'app')
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: INIT_DB
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
