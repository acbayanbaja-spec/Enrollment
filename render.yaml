# Render Blueprint — builds from repo root (uses ./requirements.txt → backend/requirements.txt).
# IMPORTANT: This must be a **Web Service** (Python), not a Static Site — otherwise /docs and /health 404.
# Start runs uvicorn from backend/ so `app.main` imports correctly.
# Create PostgreSQL first; set DATABASE_URL to Internal URL on the Web Service.
#
# If you set Root Directory to `backend`: build `pip install -r requirements.txt`, start `uvicorn asgi:app ...`
# (uses backend/asgi.py). If Root Directory is empty: start `uvicorn asgi:app ...` (uses repo root asgi.py).

services:
  - type: web
    name: seait-enrollment-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Must use asgi:app (repo root) — not app.main:app — see asgi.py
    startCommand: uvicorn asgi:app --host 0.0.0.0 --port $PORT
    # Optional: in the dashboard set Health Check Path to /health (fast). Use /api/health to verify DB.
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: INIT_DB
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
