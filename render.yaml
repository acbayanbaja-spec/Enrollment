# Render Blueprint — builds from repo root (uses ./requirements.txt → backend/requirements.txt).
# IMPORTANT: This must be a **Web Service** (Python), not a Static Site — otherwise /docs and /health 404.
# Start runs uvicorn from backend/ so `app.main` imports correctly.
#
# PostgreSQL is defined below and DATABASE_URL is injected automatically — avoids password mismatch
# between a manually pasted URL and the database. If you already have a separate Postgres instance,
# remove the `databases` block and the `fromDatabase` entry, then set DATABASE_URL manually in the dashboard.
#
# If you set Root Directory to `backend`: build `pip install -r requirements.txt`, start `uvicorn asgi:app ...`
# (uses backend/asgi.py). If Root Directory is empty: start `uvicorn asgi:app ...` (uses repo root asgi.py).

databases:
  - name: enrollment-postgres
    plan: free
    databaseName: enrollment_db

services:
  - type: web
    name: seait-enrollment-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Must use asgi:app (repo root) — not app.main:app — see asgi.py
    startCommand: uvicorn asgi:app --host 0.0.0.0 --port $PORT
    # Optional: in the dashboard set Health Check Path to /health (fast). Use /api/health to verify DB.
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Tables + PostgreSQL patches run automatically on startup (see app.schema_patches).
      # Set SKIP_AUTO_DB_SETUP=true only if you apply DDL entirely outside the app.
      - key: SKIP_AUTO_DB_SETUP
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: enrollment-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
